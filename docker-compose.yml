services:
  docmoc:
    container_name: docmoc
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCMOC_IMAGE:-docmoc:local}
    ports:
      - "3000:3001"
    volumes:
      - ./data:/app/data
    environment:
      ADMIN_EMAIL: "admin@docmoc.local"
      ADMIN_PASSWORD: "changeme123!"
      NODE_ENV: "production"
    restart: on-failure:5
