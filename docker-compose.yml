services:
  docmoc:
    container_name: docmoc
    image: ${DOCMOC_IMAGE:-egsa/docmoc:latest}
    pull_policy: always
    ports:
      - "3000:3001"
    volumes:
      - ./data:/app/data
    environment:
      ADMIN_EMAIL: "admin@docmoc.local"
      ADMIN_PASSWORD: "changeme123!"
      NODE_ENV: "production"
    restart: on-failure:5
